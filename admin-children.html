<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children Admin — KIM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#C8922A;--gold-light:#E8B84B;--deep:#0D0D0D;--ink:#1A1613;--muted:#6B6560;--bg:#F5F5F5;--white:#fff;--border:#E8E8E8}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .login-card{background:var(--white);border-radius:16px;box-shadow:0 4px 40px rgba(0,0,0,0.08);padding:48px 40px;width:100%;max-width:380px;text-align:center}
  .login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
  .login-input{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:var(--bg);outline:none;margin-bottom:12px}
  .login-input:focus{border-color:var(--gold)}
  .login-btn{width:100%;padding:14px;background:var(--gold);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer}
  .login-error{color:#C0392B;font-size:13px;margin-top:10px;display:none}
  .admin-screen{display:none}
  .topbar{background:var(--deep);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
  .topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#F5EDD8}
  .topbar-logo span{color:var(--gold)}
  .topbar-link{font-size:13px;color:rgba(245,237,216,0.5);text-decoration:none;margin-left:16px}
  .topbar-link:hover{color:var(--gold)}
  .admin-body{max-width:1100px;margin:0 auto;padding:40px 24px}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .page-sub{font-size:14px;color:var(--muted);margin-bottom:20px}

  /* DATE BAR */
  .date-bar{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap;padding:16px 20px;background:var(--white);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .date-bar-label{font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-right:4px}
  .date-input{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);outline:none;cursor:pointer}
  .date-input:focus{border-color:var(--gold)}
  .date-btn{padding:9px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .date-btn:hover{border-color:var(--gold);color:var(--gold)}
  .date-btn.active{background:var(--gold);border-color:var(--gold);color:white;font-weight:500}
  .date-display{font-size:13px;color:var(--muted);margin-left:4px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .card{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:24px}
  .card:last-child{margin-bottom:0}
  .card-title{font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .attendant-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F5F5F5}
  .attendant-row:last-child{border-bottom:none}
  .attendant-name{font-size:14px;font-weight:500;color:var(--ink)}
  .attendant-time{font-size:12px;color:var(--muted);margin-top:2px}
  .suspend-btn{padding:6px 14px;background:transparent;border:1px solid #E05555;color:#E05555;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s}
  .suspend-btn:hover{background:#E05555;color:white}
  .child-row-admin{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F5F5F5}
  .child-row-admin:last-child{border-bottom:none}
  .child-row-name{font-size:14px;font-weight:500;color:var(--ink)}
  .child-row-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500}
  .badge-in{background:#FBF4E8;color:var(--gold)}
  .badge-out{background:#F0FFF4;color:#27AE60}
  .empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}
  @media(max-width:768px){.grid{grid-template-columns:1fr}}
  @media(max-width:500px){.date-bar{flex-wrap:wrap}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">KIM Admin</div>
    <p class="login-sub">CHILDREN DASHBOARD</p>
    <input type="password" class="login-input" id="admin-password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect password.</p>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="admin-screen">
  <div class="topbar">
    <div class="topbar-logo">KIM <span>Admin</span></div>
    <div>
      <a href="/admin" class="topbar-link">Command Center</a>
      <a href="/admin-givers" class="topbar-link">Givers</a>
      <a href="/admin-checkins" class="topbar-link">Check-ins</a>
      <a href="/admin-builders" class="topbar-link">Builders</a>
      <a href="/" class="topbar-link">← Site</a>
      <a href="#" onclick="signOut()" class="topbar-link">Sign Out</a>
    </div>
  </div>

  <div class="admin-body">
    <h1 class="page-title">Children's Ministry</h1>
    <p class="page-sub" id="last-updated">Loading...</p>

    <!-- DATE BAR -->
    <div class="date-bar">
      <span class="date-bar-label">Viewing:</span>
      <input type="date" class="date-input" id="date-picker" onchange="onDateChange()">
      <button class="date-btn active" id="btn-today" onclick="setToday()">Today</button>
      <button class="date-btn" id="btn-yesterday" onclick="setYesterday()">Yesterday</button>
      <span class="date-display" id="date-display"></span>
    </div>

    <!-- STATS + ATTENDANTS -->
    <div class="grid">
      <div class="card" style="margin-bottom:0">
        <p class="card-title" id="label-attendants">Signed-In Attendants</p>
        <div id="attendants-list"><p class="empty">Loading...</p></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <p class="card-title" id="label-summary">Summary</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Checked In</div>
            <div style="font-size:32px;font-weight:300;" id="stat-checkedin">—</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Picked Up</div>
            <div style="font-size:32px;font-weight:300;" id="stat-pickedup">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD ATTENDANT -->
    <div class="card">
      <p class="card-title">Add Attendant</p>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;">
        <div>
          <label style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;">Name</label>
          <input type="text" id="new-attendant-name" placeholder="Full name" style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;">
        </div>
        <div>
          <label style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;">PIN (numbers only)</label>
          <input type="text" id="new-attendant-pin" placeholder="e.g. 7823" maxlength="8" style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;">
        </div>
        <button onclick="addAttendant()" style="padding:12px 20px;background:var(--gold);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;">Add</button>
      </div>
      <p id="attendant-msg" style="font-size:13px;margin-top:10px;display:none;"></p>
    </div>

    <!-- CHILDREN LIST -->
    <div class="card">
      <p class="card-title" id="label-children">All Children</p>
      <div id="children-list"><p class="empty">Loading...</p></div>
    </div>

  </div>
</div>

<script>
const PASS = 'KIM2026!';

// ── AUTH ───────────────────────────────────────────────────────────────────
function login() {
  if (document.getElementById('admin-password').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    initDatePicker();
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function signOut() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-password').value = '';
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────
function getTodayCST() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Chicago' });
}

function getSelectedDate() {
  return document.getElementById('date-picker').value || getTodayCST();
}

function getDateLabel(val) {
  const today = getTodayCST();
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  d.setDate(d.getDate() - 1);
  const yesterday = d.toLocaleDateString('en-CA');
  if (val === today) return 'Today';
  if (val === yesterday) return 'Yesterday';
  return new Date(val + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function updateDateUI() {
  const val = getSelectedDate();
  const today = getTodayCST();
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  d.setDate(d.getDate() - 1);
  const yesterday = d.toLocaleDateString('en-CA');

  document.getElementById('btn-today').classList.toggle('active', val === today);
  document.getElementById('btn-yesterday').classList.toggle('active', val === yesterday);

  const label = getDateLabel(val);
  const fullDate = new Date(val + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('date-display').textContent = val === today || val === yesterday ? '· ' + fullDate : '';

  // Update section labels
  document.getElementById('label-attendants').textContent = 'Signed-In Attendants — ' + label;
  document.getElementById('label-summary').textContent = 'Summary — ' + label;
  document.getElementById('label-children').textContent = 'All Children — ' + label;
}

function initDatePicker() {
  document.getElementById('date-picker').value = getTodayCST();
  updateDateUI();
}

function setToday() {
  document.getElementById('date-picker').value = getTodayCST();
  updateDateUI();
  loadData();
}

function setYesterday() {
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  d.setDate(d.getDate() - 1);
  document.getElementById('date-picker').value = d.toLocaleDateString('en-CA');
  updateDateUI();
  loadData();
}

function onDateChange() {
  updateDateUI();
  loadData();
}

// ── DATA ───────────────────────────────────────────────────────────────────
async function loadData() {
  const date = getSelectedDate();
  try {
    const [childrenRes, attendantsRes] = await Promise.all([
      fetch(`/api/children?action=dashboard-all&date=${date}`),
      fetch(`/api/children?action=attendants&date=${date}`)
    ]);
    const childrenData = await childrenRes.json();
    const attendantsData = await attendantsRes.json();
    renderChildren(childrenData.records || []);
    renderAttendants(attendantsData.attendants || []);
    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }) + ' CST';
  } catch(e) {
    document.getElementById('children-list').innerHTML = '<p class="empty">Error loading data.</p>';
  }
}

function renderAttendants(list) {
  const el = document.getElementById('attendants-list');
  const label = getDateLabel(getSelectedDate()).toLowerCase();
  if (!list.length) {
    el.innerHTML = `<p class="empty">No attendants signed in ${label}.</p>`;
    return;
  }
  el.innerHTML = list.map(a => {
    const t = new Date(a.signed_in_at).toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true });
    const suspended = a.suspended;
    return `<div class="attendant-row">
      <div>
        <div class="attendant-name" style="${suspended ? 'text-decoration:line-through;color:#999;' : ''}">${a.attendant_name}</div>
        <div class="attendant-time">Signed in at ${t}${suspended ? ' · Suspended' : ''}</div>
      </div>
      <button class="suspend-btn" onclick="toggleSuspend('${a.id}',${suspended})">${suspended ? 'Reinstate' : 'Suspend'}</button>
    </div>`;
  }).join('');
}

function renderChildren(list) {
  const el = document.getElementById('children-list');
  const label = getDateLabel(getSelectedDate()).toLowerCase();
  const checkedIn = list.filter(r => r.status === 'checked_in').length;
  const pickedUp = list.filter(r => r.status === 'picked_up').length;
  document.getElementById('stat-checkedin').textContent = checkedIn;
  document.getElementById('stat-pickedup').textContent = pickedUp;

  if (!list.length) {
    el.innerHTML = `<p class="empty">No children checked in ${label}.</p>`;
    return;
  }
  el.innerHTML = list.map(rec => {
    const t = new Date(rec.checked_in_at).toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', hour12: true });
    const badge = rec.status === 'picked_up'
      ? '<span class="badge badge-out">Picked Up</span>'
      : '<span class="badge badge-in">Checked In</span>';
    return `<div class="child-row-admin">
      <div>
        <div class="child-row-name">${rec.child_name}</div>
        <div class="child-row-meta">Parent: ${rec.parent_name} · In at ${t}${rec.allergies ? ' · ⚠️ ' + rec.allergies : ''}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

// ── ATTENDANT MANAGEMENT ───────────────────────────────────────────────────
async function toggleSuspend(id, currentlySuspended) {
  await fetch('/api/children?action=suspend-attendant', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': PASS },
    body: JSON.stringify({ id, suspend: !currentlySuspended })
  });
  loadData();
}

async function addAttendant() {
  const name = document.getElementById('new-attendant-name').value.trim();
  const pin = document.getElementById('new-attendant-pin').value.trim();
  const msg = document.getElementById('attendant-msg');
  msg.style.display = 'none';

  if (!name) { msg.textContent = 'Please enter a name.'; msg.style.color = '#C0392B'; msg.style.display = 'block'; return; }
  if (!pin || pin.length < 4) { msg.textContent = 'PIN must be at least 4 digits.'; msg.style.color = '#C0392B'; msg.style.display = 'block'; return; }

  const res = await fetch('/api/children?action=add-attendant', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': PASS },
    body: JSON.stringify({ name, pin })
  });
  const data = await res.json();
  if (res.ok) {
    msg.textContent = name + ' added with PIN ' + pin;
    msg.style.color = '#27AE60';
    msg.style.display = 'block';
    document.getElementById('new-attendant-name').value = '';
    document.getElementById('new-attendant-pin').value = '';
    loadData();
  } else {
    msg.textContent = data.error || 'Error adding attendant.';
    msg.style.color = '#C0392B';
    msg.style.display = 'block';
  }
}
</script>
</body>
</html>
