<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Children Pickup | Kingdom Insights Ministries</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzBEMEQwRCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNTAiIHI9IjQ3IiBmaWxsPSJub25lIiBzdHJva2U9IiNDODkyMkEiIHN0cm9rZS13aWR0aD0iNCIvPjx0ZXh0IHg9IjUwIiB5PSI2OCIgZm9udC1mYW1pbHk9Ikdlb3JnaWEsc2VyaWYiIGZvbnQtc2l6ZT0iNTgiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjQzg5MjJBIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5LPC90ZXh0Pjwvc3ZnPg==">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #C8922A; --gold-light: #E8B84B; --deep: #0D0D0D; --ink: #1A1613; --muted: #888; --bg: #F5F5F5; --white: #fff; --border: #E8E8E8; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
    .header { background: var(--deep); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header img { height: 40px; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #F5EDD8; }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .screen-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
    .screen-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .field input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); background: var(--white); outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: #BBB; }
    .btn { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background: var(--gold-light); }
    .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); margin-top: 10px; }
    .error-msg { color: #C0392B; font-size: 13px; margin-top: 8px; display: none; }
    .qr-card { background: var(--white); border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); text-align: center; }
    .qr-child-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .qr-status { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .qr-container { display: flex; justify-content: center; margin-bottom: 12px; }
    .qr-container > div { padding: 12px; background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: inline-block; }
    .qr-code-label { font-family: monospace; font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
    .picked-up-card { background: #F0FFF4; border: 1px solid #B7E4C7; border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
    .picked-up-check { font-size: 28px; color: #27AE60; }
    .picked-up-name { font-size: 16px; font-weight: 500; color: var(--ink); }
    .picked-up-time { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .empty-state { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <a href="/"><img src="/kim-logo.png" alt="KIM"></a>
  <div class="header-title">Children Pickup</div>
</div>
<button onclick="showScreen('screen-phone');document.getElementById('lookup-phone').value='';" style="position:fixed;top:16px;right:16px;background:transparent;border:none;color:rgba(245,237,216,0.4);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;z-index:200;" onmouseover="this.style.color='#C8922A'" onmouseout="this.style.color='rgba(245,237,216,0.4)'">Sign Out</button>

<div class="container">

  <!-- PHONE LOOKUP -->
  <div class="screen active" id="screen-phone">
    <h1 class="screen-title">Pick Up Your Child</h1>
    <p class="screen-sub">Enter your phone number to retrieve your pickup QR codes.</p>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="lookup-phone" placeholder="(817) 555-0100" autocomplete="tel" onkeydown="if(event.key==='Enter')lookupChildren()">
    </div>
    <p class="error-msg" id="phone-error">Please enter a valid phone number.</p>
    <button class="btn" onclick="lookupChildren()">Find My Children</button>
  </div>

  <!-- QR CODES -->
  <div class="screen" id="screen-qr">
    <h1 class="screen-title">Your QR Codes</h1>
    <p class="screen-sub">Show each QR code to the attendant to pick up your child.</p>
    <div id="qr-list"></div>
    <button class="btn btn-outline" onclick="showScreen('screen-phone')" style="margin-top:8px;">← Back</button>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://swxhwdyszgmjznvhmavq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3eGh3ZHlzemdtanpudmhtYXZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mzc5OTcsImV4cCI6MjA4OTUxMzk5N30.nd1Vzmkhi0gklchYnu6OmW4C_LZ_CkS1_G7wQ2SPGW4';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function lookupChildren() {
  const phone = document.getElementById('lookup-phone').value.trim().replace(/\D/g, '');
  const errorEl = document.getElementById('phone-error');
  errorEl.style.display = 'none';
  if (phone.length < 10) { errorEl.style.display = 'block'; return; }

  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(
    SUPABASE_URL + '/rest/v1/kim_children_checkin?parent_phone=eq.' + phone + '&event_date=eq.' + today + '&select=*&order=checked_in_at.asc',
    { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
  );
  const data = await res.json();

  if (!data || data.length === 0) {
    errorEl.textContent = 'No children checked in today with that phone number.';
    errorEl.style.display = 'block';
    return;
  }

  renderQRCodes(data);
  showScreen('screen-qr');
}

function renderQRCodes(records) {
  const list = document.getElementById('qr-list');

  if (!records.length) {
    list.innerHTML = '<div class="empty-state">No children checked in today.</div>';
    return;
  }

  list.innerHTML = records.map(rec => {
    if (rec.status === 'picked_up') {
      const pt = rec.picked_up_at ? new Date(rec.picked_up_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : '';
      return '<div class="picked-up-card">' +
        '<div class="picked-up-check">✓</div>' +
        '<div><div class="picked-up-name">' + rec.child_name + '</div>' +
        '<div class="picked-up-time">Picked up at ' + pt + '</div></div>' +
        '</div>';
    }
    return '<div class="qr-card" id="card-' + rec.pickup_code + '">' +
      '<div class="qr-child-name">' + rec.child_name + '</div>' +
      '<div class="qr-status">Checked in · Show to attendant</div>' +
      '<div class="qr-container"><div id="qr-' + rec.pickup_code + '"></div></div>' +
      '<div class="qr-code-label">' + rec.pickup_code + '</div>' +
    '</div>';
  }).join('');

  // Generate QR codes
  records.filter(r => r.status !== 'picked_up').forEach(rec => {
    new QRCode(document.getElementById('qr-' + rec.pickup_code), {
      text: 'https://kim.church/children-pickup-scan?code=' + rec.pickup_code,
      width: 180, height: 180,
      colorDark: '#0D0D0D', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.H
    });
  });
}
</script>

  <script src="/nav.js"></script>
</body>
</html>
